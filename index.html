<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>hehe boys</title>
  <link rel="icon" href="https://raw.githubusercontent.com/meokisama/meokisama.github.io/gh-pages/favicon.ico" />
  <link rel="stylesheet" href="css/reset.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="textWrapper">
    <div id="textContent">Trang này chỉ có thông tin cá nhân và tôi sẽ tạm ẩn đi trong thời gian diễn ra sự kiện để né
      những nhân tố đã tìm được tới đây bởi sự thúc đẩy của trí tò mò, như bạn!</div>
  </div>
  <div class="bg">
    <div id="world"></div>
    <div id="instructions">^<br />Move the head of this bird<br /><span class="lightInstructions">and watch how the 2
        others<br />interact with him</span></div>
  </div>

  <script src="js/three.min.js"></script>
  <script src="js/TweenMax.min.js"></script>
  <script src="js/OrbitControls.js"></script>
  <script src="js/script.js"></script>
  <script type="text/javascript">
    function UpdateClock() {
      var time = new Date();
      var Hour = time.getHours() % 12 ? time.getHours() % 12 : 12;
      Hour = Hour == 0 ? 12 : Hour;
      Hour = Hour < 10 ? "0" + Hour : Hour;
      var Minute = time.getMinutes() < 10 ? "0" + time.getMinutes() : time.getMinutes();
      var Second = time.getSeconds() < 10 ? "0" + time.getSeconds() : time.getSeconds();
      var Meridiem = time.getHours() < 12 ? "AM" : "PM";
      var clock = document.getElementById("instructions");
      var timeText = Hour + ":" + Minute + ":" + Second;
      clock.innerHTML = timeText + "<br/><span class='lightInstructions'></span>";
      clock.setAttribute("data-text", timeText);
      setTimeout(UpdateClock, 1000);
    }
    UpdateClock();
  </script>

</body>

</html>
